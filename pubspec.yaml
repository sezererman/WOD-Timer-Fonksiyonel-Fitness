name: fonksiyonel_fitness_timer
description: "CrossFit & Fonksiyonel Fitness Timer - EMOM, AMRAP, Tabata, ForTime"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Local Database
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Sound
  audioplayers: ^6.1.0

  # Dependency Injection
  get_it: ^8.0.3

  # Routing
  go_router: ^15.1.2

  # UI Helpers
  google_fonts: ^6.2.1
  supabase_flutter: ^2.12.4
  bloc_concurrency: ^0.3.0
  rxdart: ^0.28.0
  flutter_dotenv: ^6.0.1
  uuid: ^4.5.3
  # Media Picker & Cropper
  image_picker: ^1.1.2
  image_cropper: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: 10.0.0
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000" # Arka plan rengini siyah olarak belirledik, isterseniz #FFFFFF (beyaz) vs yapabilirsiniz.
  adaptive_icon_foreground: "assets/app_icon.png"
  adaptive_icon_foreground_inset: 0


flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - .env
